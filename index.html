<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mayda 🥰</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #03001C; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* CAPA DEL BOTÓN: Arriba de todo para que no se bloquee */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; text-align: center; background: rgba(3, 0, 28, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease-in-out;
        }

        #canvas-container {
            position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none;
        }

        #intro-title { font-size: 36px; color: #87CEEB; margin-bottom: 10px; font-family: 'Georgia', serif; text-shadow: 0 0 15px rgba(135, 206, 235, 0.8); }
        #intro-text { font-size: 16px; color: #FFF0F5; margin-bottom: 30px; max-width: 400px; line-height: 1.5; }

        #start-button {
            background: transparent; color: #FFB3D9; border: 2px solid #FFB3D9;
            padding: 15px 30px; font-size: 18px; font-weight: bold;
            border-radius: 30px; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 179, 217, 0.4); letter-spacing: 2px;
        }
        #start-button:hover { background: #FFB3D9; color: #03001C; transform: scale(1.05); }

        .orbe, .key-orbe, .heart-particle { position: absolute; border-radius: 50%; opacity: 0; pointer-events: none; }
        .key-orbe { color: #FFB3D9; font-size: 14px; white-space: nowrap; animation: floatWords 18s infinite linear, pulseWord 4s infinite ease-in-out; }
        .heart-particle { width: 6px; height: 6px; background-color: #FF1A75; box-shadow: 0 0 18px #FF6699; transition: all 4s ease-in-out; }
        .heart-sparkle { width: 3px; height: 3px; background-color: #FFFFFF; animation: sparklePulse 1s infinite alternate; position: absolute; opacity: 0; }

        #photo-gallery { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        .photo-container { position: absolute; opacity: 0; width: 28vmin; height: 28vmin; border: 4px solid #fff; border-radius: 12px; overflow: hidden; transform: rotate(var(--rot)) scale(0.7); transition: opacity 2.5s ease-in-out, transform 3s ease-out; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .photo-container.visible { opacity: 1; transform: rotate(var(--rot)) scale(1); }

        #messages { position: relative; text-align: center; opacity: 0; transition: opacity 3s ease-in-out; z-index: 10; display: none; background: rgba(3, 0, 28, 0.6); padding: 40px; border-radius: 20px; backdrop-filter: blur(8px); }
        #greeting { font-size: 44px; color: #FFB3D9; text-shadow: 0 0 25px rgba(255, 179, 217, 1); margin-bottom: 10px; font-style: italic; }
        #personal-message { font-size: 20px; color: #FFF0F5; margin-top: 15px; max-width: 650px; }

        @keyframes pulseStar { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.9; } }
        @keyframes pulseWord { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        @keyframes floatWords { 0% { opacity: 0; transform: translate(var(--start-x), var(--start-y)); } 8% { opacity: 1; } 92% { opacity: 1; } 100% { opacity: 0; transform: translate(var(--end-x), var(--end-y)); } }
        @keyframes pulseHeart { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.03); opacity: 1; } }
        @keyframes sparklePulse { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; } }
    </style>
</head>
<body>

<audio id="musica-fondo">
    <source src="https://res.cloudinary.com/dvm2v0zvr/video/upload/v1781928617/Mi_vida_sin_ti_-_Jes%C3%BAs_Adrian_romero_-_C_Cmusicafull_128k_dfonnp.mp3" type="audio/mpeg">
</audio>

<div id="canvas-container"></div>

<div id="photo-gallery">
    <div class="photo-container" style="top: 8%; left: 8%; --rot: -12deg;"><img src="https://res.cloudinary.com/dvm2v0zvr/image/upload/v1775524344/xrrsqwzwxet2bqpey8mh.jpg"></div>
    <div class="photo-container" style="top: 12%; right: 8%; --rot: 15deg;"><img src="https://res.cloudinary.com/dvm2v0zvr/image/upload/v1771000212/lu0vh9dirievwosl19sx.jpg"></div>
    <div class="photo-container" style="bottom: 10%; left: 12%; --rot: -8deg;"><img src="https://res.cloudinary.com/dvm2v0zvr/image/upload/v1771012672/zohlnjlunxeafhnzdinx.jpg"></div>
    <div class="photo-container" style="bottom: 15%; right: 10%; --rot: 10deg;"><img src="https://res.cloudinary.com/dvm2v0zvr/image/upload/v1772531768/jg9mt5nc4h6hkeweofsd.jpg"></div>
</div>

<div id="intro-screen">
    <div id="intro-title">Buenas noches, Mi Amor ✨</div>
    <div id="intro-text">La vida es más bonita desde que nuestras risas se encontraron.</div>
    <button id="start-button">✨ ENTRAR AL UNIVERSO ✨</button>
</div>

<div id="messages">
    <div id="greeting">Mi Hermosa Mayda</div>
    <div id="personal-message">Cada destello en este pequeño universo es un recordatorio de lo mucho que te quiero. Eres la estrella más bonita que existe. 🥰</div>
</div>

<script>
    const canvasContainer = document.getElementById('canvas-container');
    const introScreen = document.getElementById('intro-screen');
    const startButton = document.getElementById('start-button');
    const messages = document.getElementById('messages');
    const musica = document.getElementById('musica-fondo');
    
    // Generar estrellas y palabras
    for (let i = 0; i < 180; i++) {
        const orbe = document.createElement('div'); orbe.classList.add('orbe');
        orbe.style.left = Math.random() * 100 + '%'; orbe.style.top = Math.random() * 100 + '%';
        canvasContainer.appendChild(orbe);
    }

    startButton.addEventListener('click', () => {
        musica.play();
        introScreen.style.opacity = '0';
        setTimeout(() => { introScreen.style.display = 'none'; messages.style.display = 'block'; }, 1000);
        
        // Iniciar animaciones
        setTimeout(() => {
            document.querySelectorAll('.photo-container').forEach((photo, index) => {
                setTimeout(() => photo.classList.add('visible'), index * 800);
            });
            setTimeout(() => messages.style.opacity = '1', 1500);
        }, 1000);
    });
</script>
</body>
</html>
